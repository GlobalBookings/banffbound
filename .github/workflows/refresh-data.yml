# Refresh live data every 2 hours and commit updated JSON files.
# The push triggers DigitalOcean App Platform's auto-deploy,
# which runs the full build (astro build + pagefind).

name: Refresh Live Data

on:
  # Run every 2 hours
  schedule:
    - cron: '0 */2 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write # needed to push the updated data files

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies (only what the fetchers need)
      - name: Install dependencies
        run: npm ci

      # 4. Run the data fetchers to produce fresh JSON
      - name: Fetch live data
        run: node scripts/fetch-live-data.mjs

      # 5. Check for changes and commit if any
      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/data/live/

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "✅ No data changes — skipping commit."
          else
            git commit -m "chore: refresh live data [skip ci]"
            git push
            echo "✅ Fresh data committed and pushed."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
