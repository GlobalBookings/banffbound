# Validate that the Astro site builds successfully after data changes.
# Skipped for automated data-refresh commits ("[skip ci]" in message).

name: Build Check

on:
  push:
    branches: [main]

jobs:
  build:
    # Skip runs triggered by the data-refresh bot
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Fetch latest live data
      - name: Fetch live data
        run: npm run fetch-data

      # 5. Run full build (astro build + pagefind)
      - name: Build site
        run: npm run build
